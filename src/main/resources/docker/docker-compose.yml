version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sensorgroup-mongodb
    ports:
      - "27017:27017"
    command: mongod --noauth
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - sensorgroup-network
    healthcheck:
      test: mongosh /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:latest
    container_name: sensorgroup-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - sensorgroup-network

volumes:
  mongo-data:
  mongo-config:

networks:
  sensorgroup-network:
    driver: bridge
